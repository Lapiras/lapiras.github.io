<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deadlock Mod Tools</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #111;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    h1 { font-size: 2rem; margin-bottom: 8px; text-align: center; }
    .subtitle { color: #888; margin-bottom: 48px; text-align: center; }
    .mod-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 700px;
    }
    .mod-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 32px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .mod-card:hover:not(.disabled) { border-color: #e84040; background: #1f1a1a; }
    .mod-card.disabled { opacity: 0.4; cursor: not-allowed; }
    .mod-card .icon { font-size: 2rem; }
    .mod-card .label { font-size: 1rem; font-weight: 600; }
    .mod-card .tag {
      font-size: 0.7rem;
      background: #e84040;
      color: white;
      padding: 2px 8px;
      border-radius: 99px;
    }
    .mod-card.disabled .tag { background: #444; }
  </style>
</head>
<body>
  <h1>Deadlock Mod Tools</h1>
  <p class="subtitle">Select a mod type to get started</p>
  <div class="mod-grid">
    <a href="sound-replacement.html" class="mod-card">
      <span class="icon">🔊</span>
      <span class="label">Sound Replacement</span>
      <span class="tag">Available</span>
    </a>
    <div class="mod-card disabled">
      <span class="icon">🎨</span>
      <span class="label">Visual / Texture</span>
      <span class="tag">Coming Soon</span>
    </div>
    <div class="mod-card disabled">
      <span class="icon">📦</span>
      <span class="label">3D Model</span>
      <span class="tag">Coming Soon</span>
    </div>
  </div>
</body>
</html>
